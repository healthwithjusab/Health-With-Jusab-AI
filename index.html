<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health With Jusab AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Health With Jusab AI</h1>
    <p>Apna topic aur Gemini API Key likhiye!</p>
    
    <div class="form-group">
      <label for="apiKey">Gemini API Key:</label>
      <input type="password" id="apiKey" placeholder="Yahan apni API key paste karein">
    </div>

    <div class="form-group">
      <label for="topic">Topic / Keyword:</label>
      <input type="text" id="topic" placeholder="Jaise: Aloe Vera Gel ke fayde">
    </div>

    <button id="generateBtn" onclick="generateContent()">Generate Content</button>

    <div class="result-box">
      <h3>Generated Content:</h3>
      <div id="output">Yahan aapka content aayega...</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
